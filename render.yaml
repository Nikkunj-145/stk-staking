services:
  - type: web
    name: stk-staking-greenbelt
    runtime: static
    plan: free
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: true
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: VITE_TOKEN_ID
        value: CDUECTBOEY4HIGBKXNRW25LB4SYVI4UAUDME2LYAE6T6K5RRFTWCIEDY
      - key: VITE_STAKING_ID
        value: CBT4AXYW2RL6QG2QA2C7P4UOBEZRVJLGQW6764NTB6WZBFJNM2SWXD2R
      - key: VITE_NETWORK_PASSPHRASE
        value: "Test SDF Network ; September 2015"
      - key: VITE_RPC_URL
        value: https://soroban-testnet.stellar.org
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
